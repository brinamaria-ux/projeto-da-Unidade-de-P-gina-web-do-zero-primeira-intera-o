<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cine</title>
        <style>
            /* Configuração geral do fundo da página e da fonte */
            body {
                background-color: #121212; /* Um preto fosco, confortável para os olhos */
                color: #E0E0E0; /* Texto claro, mas não um branco puro brilhante */
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                padding: 20px;
            }

            /* Cabeçalho principal */
            header {
                background-color: #1A1A1A; /* Grafite escuro */
                border-bottom: 4px solid #600202; /* Linha de destaque com o seu vermelho */
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 30px 20px;
                border-radius: 8px 8px 0 0; /* Arredonda as pontas de cima */
            }

            header h1 {
                color: #FF3333; /* Um vermelho mais vivo para o título brilhar */
                margin-bottom: 10px;
                font-size: 2.5rem;
            }
         
            /* Conteúdo Principal */
            main {
                background-color: #1A1A1A; /* Mantém o mesmo fundo do header para unificar */
                max-width: 800px;
                margin: 0 auto;
                padding: 30px 20px;
                border-radius: 0 0 8px 8px; /* Arredonda as pontas de baixo */
            }

            main h2 {
                color: #FF3333; /* Destaque para o título do post */
                margin-top: 20px;
            }

            /* Estilo para o nome do autor */
            .autor {
                color: #888888;
                font-style: italic;
                font-size: 0.9rem;
                margin-bottom: 20px;
            }

            /* Ajuste no espaçamento dos parágrafos */
            p {
                line-height: 1.6; /* Aumenta o espaço entre as linhas, melhorando a leitura */
            }
            
            /* Estilização da logo */
            .logo-cineverso {
                width: 100px;
                height: 100px;
                border-radius: 8px; /* Opcional: deixa os cantos da logo levemente arredondados */
                object-fit: cover;
                display: block; /* Garante que ela se comporte bem no alinhamento */
                margin-bottom: 15px; /* Cria um espaço entre a imagem e o título abaixo */
            }
        </style>
    </head>
    <body>
            <header>
                <h1>Cineverso</h1>
                <p>Chega de perder tempo no catálogo: o <strong>Cineverso</strong> traz dicas rápidas e certeiras de séries para você dar o play em segundos.</p>
            </header>
            
            <main>
                <img src="Gemini_Generated_Image_ix1ky4ix1ky4ix1k.png" class="logo-cineverso" alt="Logotipo para o blog Cineverso. Em um fundo preto, destaca-se um ícone circular que combina um rolo de filme cinematográfico com uma galáxia em espiral no centro. O design utiliza as cores vermelho-escuro, preto e off-white. Abaixo do ícone, está escrito o nome CINEVERSO em letras maiúsculas e a frase EXPLORANDO O CINEMA E ALÉM em uma fonte menor, tudo na cor off-white.">
                
                <h2>Meu Primeiro post</h2>  
                <p class="autor">Por: M. Sophie Paulicci Brina</p> 
                <p>Bem-vindo ao Cineverso! Aqui vou compartilhar dicas de filmes/séries e curiosidades sobre o mundo do cinema.</p>
            </main>
    </body>
</html>
